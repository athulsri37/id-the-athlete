version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tennisguessr
      POSTGRES_PASSWORD: tennisguessr_dev_pw
      POSTGRES_DB: tennisguessr
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend/TennisGuessr.Api
    ports:
      - "5080:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=tennisguessr;Username=tennisguessr;Password=tennisguessr_dev_pw"
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "5174:5174"
    depends_on:
      - backend

volumes:
  pgdata:
